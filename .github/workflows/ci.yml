name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same ref so PRs only ever reflect the latest push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Fail-fast across the matrix: if macOS goes red, kill Linux too. macOS is
    # the primary target per PRD section 11.4, so we list it first for clarity.
    strategy:
      fail-fast: true
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Bun 1.3.x: text-format bun.lock landed in 1.2; older versions
          # error with "Unknown lockfile version". Repo lockfile was generated
          # with 1.3.10. PRD §11.4 names 1.1.x as a minimum but the project
          # actually requires the newer lockfile parser.
          bun-version: 1.3.10

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format check (biome)
        run: bun run check

      - name: Type check (tsc --noEmit)
        run: bunx tsc --noEmit

      - name: Test (bun test)
        run: bun test

      - name: Bench (perf NFRs)
        # Asserts the PRD section 11.1 targets (ls < 200ms at 100k rows etc).
        # Non-zero exit fails the job so a regression blocks merge.
        run: bun run scripts/bench-db.ts

  audit:
    name: audit (bun audit)
    runs-on: ubuntu-latest
    # Runs alongside `check`; a high/critical advisory fails the pipeline.
    # Note on tool choice: Bun 1.3.x ships `bun audit` natively
    # (`bun audit --help` confirms it exists in 1.3.10). If a future Bun
    # release drops the subcommand, swap the `Run bun audit` step for
    # `bunx --bun better-npm-audit audit -l high` — no install needed.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun audit
        # Fails on any advisory of severity >= high (covers high + critical).
        run: bun run audit

  sbom:
    name: sbom (cyclonedx)
    runs-on: ubuntu-latest
    # Produces a CycloneDX 1.5 SBOM from bun.lock and uploads it as a
    # workflow artifact. Release automation picks the artifact up and
    # attaches it to the GitHub release (see issue #44).
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate SBOM
        run: bun run sbom > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx-${{ github.sha }}
          path: sbom.json
          if-no-files-found: error
          retention-days: 90
